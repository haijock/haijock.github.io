<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal // Scripts</title>
    <script>
        // Random terminal color palette - classic CRT phosphor colors
        const colors = [
            { main: '#00ff41', dim: '#00aa2a', name: 'phosphor-green' },
            { main: '#00ffff', dim: '#00aaaa', name: 'cyan' },
            { main: '#ffb000', dim: '#aa7500', name: 'amber' },
            { main: '#ff00ff', dim: '#aa00aa', name: 'magenta' },
            { main: '#00aaff', dim: '#0077aa', name: 'electric-blue' },
            { main: '#ff3366', dim: '#aa2244', name: 'hot-pink' },
            { main: '#39ff14', dim: '#28aa0e', name: 'neon-green' },
            { main: '#00ff88', dim: '#00aa5c', name: 'mint' }
        ];
        
        const pick = colors[Math.floor(Math.random() * colors.length)];
        document.documentElement.style.setProperty('--glow-color', pick.main);
        document.documentElement.style.setProperty('--glow-color-dim', pick.dim);
    </script>
    <style id="dynamic-styles">
        :root {
            --glow-color: #00ff41;
            --glow-color-dim: #00aa2a;
            --bg-color: #0a0f0a;
        }

        * { box-sizing: border-box; }

        body {
            background: 
                radial-gradient(ellipse at center, var(--bg-color) 0%, #000000 100%);
            background-color: #000;
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CRT phosphor screen glow */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 50%, 
                rgba(0, 255, 65, 0.03) 0%, 
                transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Scanlines */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.3) 2px,
                rgba(0, 0, 0, 0.3) 4px
            );
            pointer-events: none;
            z-index: 100;
            animation: scanlines 0.1s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* CRT flicker */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            97% { opacity: 0.9; }
            98% { opacity: 1; }
        }

        /* RGB chromatic aberration on text */
        @keyframes chroma {
            0%, 100% { text-shadow: 
                -1px 0 rgba(255, 0, 100, 0.3),
                1px 0 rgba(0, 200, 255, 0.3),
                0 0 15px var(--glow-color),
                0 0 30px var(--glow-color);
            }
            50% { text-shadow: 
                -2px 0 rgba(255, 0, 100, 0.4),
                2px 0 rgba(0, 200, 255, 0.4),
                0 0 20px var(--glow-color),
                0 0 40px var(--glow-color);
            }
        }

        /* Power-on animation */
        @keyframes powerOn {
            0% {
                filter: brightness(0);
                transform: scaleY(0.01);
            }
            20% {
                filter: brightness(3);
                transform: scaleY(0.01);
            }
            25% {
                transform: scaleY(1);
            }
            40% {
                filter: brightness(2);
            }
            60% {
                filter: brightness(1.3);
            }
            100% {
                filter: brightness(1);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            animation: flicker 4s infinite, powerOn 2s ease-out;
            border: 2px solid var(--glow-color);
            padding: 2.5rem 4rem;
            height: 340px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 15, 0, 0.4);
            box-shadow: 
                0 0 60px rgba(0, 255, 65, 0.15),
                0 0 100px rgba(0, 255, 65, 0.1),
                inset 0 0 80px rgba(0, 255, 65, 0.05),
                inset 0 0 2px 1px rgba(0, 255, 65, 0.3);
            text-shadow: 
                0 0 10px var(--glow-color),
                0 0 20px var(--glow-color),
                0 0 40px rgba(0, 255, 65, 0.5);
        }

        /* Terminal cursor blink */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .status-line {
            font-size: 1.8rem;
            font-weight: normal;
            animation: chroma 3s ease-in-out infinite;
            /*line-height: 2;*/
            /*margin-bottom: 0.5rem;*/
        }

        .prompt-line {
            font-size: 1.8rem;
            line-height: 1;
            min-height: 10.2rem;
        }

        .prompt-line .cursor {
            animation: blink 1s step-end infinite;
        }

        .prompt-line .copying {
            color: var(--glow-color-dim);
        }

        .prompt-line .dots {
            color: var(--glow-color-dim);
            display: inline-block;
            min-width: 2.5ch;
        }

        .prompt-line .done {
            color: var(--glow-color);
            text-shadow: 0 0 15px var(--glow-color), 0 0 30px var(--glow-color);
        }

        @keyframes doneBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .prompt-line .cursor {
            animation: blink 1s step-end infinite;
        }

        @keyframes doneBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        p {
            font-size: 1.1rem;
            margin: auto 0 0 0;
            line-height: 1.8;
        }

        code { 
            background: rgba(0, 255, 65, 0.08); 
            padding: 6px 14px; 
            border-radius: 2px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            font-size: 0.95rem;
            display: inline-block;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            position: relative;
        }

        code:hover {
            background: rgba(0, 255, 65, 0.15);
            border-color: var(--glow-color);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        code:active {
            transform: scale(0.98);
        }

        /* Vignette corners */
        .vignette {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 99;
        }

        /* Subtle horizontal line noise */
        .noise {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 98;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="noise"></div>
    <div class="container">
        <div class="status-line">SYSTEM_READY</div>
        <div class="prompt-line">
            > <span class="cursor">_</span>
        </div>
        <p>Run:<br>
        <code onclick="copyCommand(this, 'dotfiles bootstrapping')">curl -fsSL https://haijock.github.io/dotfiles/bootstrap.sh | bash</code>
        </p>
    </div>

    <script>
        function typeText(el, text, speed, callback) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    el.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    if (callback) callback();
                }
            }
            type();
        }

        // Animation timing constants (in milliseconds)
        const INIT_MS_PER_CHAR = 80;    // Typing speed for INITIATE line
        const COPY_MS_PER_CHAR = 100;    // Typing speed for COPYING line
        const DOTS_MS = 800;             // Delay between dots (feels like copying is happening)
        const BLINK_MS = 1200;           // DONE! blinks for 3 cycles
        const BUFFER_MS = 500;          // Extra time after DONE! before reverting

        function animateDots(el, count, callback) {
            let i = 0;
            function dot() {
                if (i < count) {
                    el.textContent += '.';
                    i++;
                    setTimeout(dot, DOTS_MS);
                } else {
                    if (callback) callback();
                }
            }
            dot();
        }

        function copyCommand(el, command) {
            const cmd = el.textContent.trim();
            const promptLine = document.querySelector('.prompt-line');
            const originalContent = promptLine.innerHTML;
            
            navigator.clipboard.writeText(cmd).then(() => {
                // Calculate timing based on command length
                const initTime = ("INITIATE " + command.toUpperCase()).length * INIT_MS_PER_CHAR;
                const copyTime = 7 * COPY_MS_PER_CHAR;
                const dotsTime = 3 * DOTS_MS;
                const blinkTime = BLINK_MS;
                const buffer = BUFFER_MS;
                const totalTime = initTime + copyTime + dotsTime + blinkTime + buffer;
                
                // Replace with animation - cursor only appears after DONE! blinks
                promptLine.innerHTML = '> <span id="type-cmd"></span><br><span class="copying" id="type-copying"></span><span class="dots" id="type-dots"></span><span class="done" id="type-done"></span><span class="cursor" id="blink-cursor">_</span>';
                
                const typeCmd = document.getElementById('type-cmd');
                const typeCopying = document.getElementById('type-copying');
                const typeDots = document.getElementById('type-dots');
                const typeDone = document.getElementById('type-done');
                const blinkCursor = document.getElementById('blink-cursor');
                
                // Hide cursor initially
                blinkCursor.style.visibility = 'hidden';
                
                // Type "> INITIATE {command}"
                typeText(typeCmd, "INITIATE " + command.toUpperCase(), 80, function() {
                    // Type "COPYING"
                    typeText(typeCopying, "COPYING", 100, function() {
                        // Animate "..."
                        animateDots(typeDots, 3, function() {
                            // Show "DONE!" and start blinking
                            typeDone.textContent = "DONE!";
                            typeDone.style.animation = 'doneBlink 0.4s step-end 3';
                            // After blinking, show cursor
                            setTimeout(() => {
                                typeDone.style.animation = '';
                                blinkCursor.style.visibility = 'visible';
                            }, blinkTime);
                        });
                    });
                });
                
                // Reset after animation
                setTimeout(() => {
                    promptLine.innerHTML = originalContent;
                }, totalTime);
            });
        }
    </script>
</body>
</html>
