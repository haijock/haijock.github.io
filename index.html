<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal // Scripts</title>
    <script>
        // Random terminal color palette - classic CRT phosphor colors
        const colors = [
            { main: '#00ff41', dim: '#00aa2a', name: 'phosphor-green' },
            { main: '#00ffff', dim: '#00aaaa', name: 'cyan' },
            { main: '#ffb000', dim: '#aa7500', name: 'amber' },
            { main: '#ff00ff', dim: '#aa00aa', name: 'magenta' },
            { main: '#00aaff', dim: '#0077aa', name: 'electric-blue' },
            { main: '#ff3366', dim: '#aa2244', name: 'hot-pink' },
            { main: '#39ff14', dim: '#28aa0e', name: 'neon-green' },
            { main: '#00ff88', dim: '#00aa5c', name: 'mint' }
        ];
        
        const pick = colors[Math.floor(Math.random() * colors.length)];
        document.documentElement.style.setProperty('--glow-color', pick.main);
        document.documentElement.style.setProperty('--glow-color-dim', pick.dim);
    </script>
    <style id="dynamic-styles">
        :root {
            --glow-color: #00ff41;
            --glow-color-dim: #00aa2a;
            --bg-color: #0a0f0a;
        }

        * { box-sizing: border-box; }

        body {
            background: 
                radial-gradient(ellipse at center, var(--bg-color) 0%, #000000 100%);
            background-color: #000;
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CRT phosphor screen glow */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 50%, 
                rgba(0, 255, 65, 0.03) 0%, 
                transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Scanlines */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.3) 2px,
                rgba(0, 0, 0, 0.3) 4px
            );
            pointer-events: none;
            z-index: 100;
            animation: scanlines 0.1s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* CRT flicker */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            97% { opacity: 0.9; }
            98% { opacity: 1; }
        }

        /* RGB chromatic aberration on text */
        @keyframes chroma {
            0%, 100% { text-shadow: 
                -1px 0 rgba(255, 0, 100, 0.3),
                1px 0 rgba(0, 200, 255, 0.3),
                0 0 15px var(--glow-color),
                0 0 30px var(--glow-color);
            }
            50% { text-shadow: 
                -2px 0 rgba(255, 0, 100, 0.4),
                2px 0 rgba(0, 200, 255, 0.4),
                0 0 20px var(--glow-color),
                0 0 40px var(--glow-color);
            }
        }

        /* Power-on animation */
        @keyframes powerOn {
            0% {
                filter: brightness(0);
                transform: scaleY(0.01);
            }
            20% {
                filter: brightness(3);
                transform: scaleY(0.01);
            }
            25% {
                transform: scaleY(1);
            }
            40% {
                filter: brightness(2);
            }
            60% {
                filter: brightness(1.3);
            }
            100% {
                filter: brightness(1);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            animation: flicker 4s infinite, powerOn 2s ease-out;
            border: 2px solid var(--glow-color);
            padding: 3rem 4rem;
            background: rgba(0, 15, 0, 0.4);
            box-shadow: 
                0 0 60px rgba(0, 255, 65, 0.15),
                0 0 100px rgba(0, 255, 65, 0.1),
                inset 0 0 80px rgba(0, 255, 65, 0.05),
                inset 0 0 2px 1px rgba(0, 255, 65, 0.3);
            text-shadow: 
                0 0 10px var(--glow-color),
                0 0 20px var(--glow-color),
                0 0 40px rgba(0, 255, 65, 0.5);
        }

        /* Terminal cursor blink */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        h1 { 
            font-size: 1.8rem; 
            margin: 0 0 1.5rem 0;
            font-weight: normal;
            animation: chroma 3s ease-in-out infinite;
        }

        h1 br {
            line-height: 2;
        }

        h1 span {
            animation: blink 1s step-end infinite;
        }

        p {
            font-size: 1.1rem;
            margin: 0;
            line-height: 1.8;
        }

        code { 
            background: rgba(0, 255, 65, 0.08); 
            padding: 6px 14px; 
            border-radius: 2px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            font-size: 0.95rem;
            display: inline-block;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            position: relative;
        }

        code:hover {
            background: rgba(0, 255, 65, 0.15);
            border-color: var(--glow-color);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        code:active {
            transform: scale(0.98);
        }

        .copied {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--glow-color);
            font-size: 0.75rem;
            opacity: 0;
            background: rgba(0, 20, 0, 0.95);
            padding: 8px 16px;
            border: 1px solid var(--glow-color);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
        }

        .copied::before {
            content: "> $ ";
            opacity: 0.5;
        }

        .copied .hex {
            display: inline;
        }

        .copied .final {
            display: none;
            text-shadow: 0 0 10px var(--glow-color);
            animation: glowPulse 0.3s ease-out;
        }

        .copied.show .hex {
            display: none;
        }

        .copied.show .final {
            display: inline;
        }

        .copied.show {
            opacity: 1;
            animation: scanReveal 0.4s steps(8);
        }

        @keyframes scanReveal {
            0% {
                clip-path: inset(0 100% 0 0);
                opacity: 1;
            }
            50% {
                clip-path: inset(0 0 0 0);
                opacity: 1;
            }
            100% {
                clip-path: inset(0 0 0 0);
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color); }
            100% { text-shadow: 0 0 10px var(--glow-color); }
        }

        /* Vignette corners */
        .vignette {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 99;
        }

        /* Subtle horizontal line noise */
        .noise {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 98;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="noise"></div>
    <div class="container">
        <h1>SYSTEM_READY<br>> <span>_</span></h1>
        <p>Run:<br>
        <code onclick="copyCommand(this)">curl -fsSL https://haijock.github.io/dotfiles/bootstrap.sh | bash
        <span class="copied">
            <span class="hex">0x[C0][P1][13][Y2]</span>
            <span class="final">COPIED</span>
        </span></code>
        </p>
    </div>

    <script>
        function copyCommand(el) {
            const cmd = 'curl -fsSL https://haijock.github.io/dotfiles/bootstrap.sh | bash';
            const copied = el.querySelector('.copied');
            const hex = copied.querySelector('.hex');
            
            const chars = '0123456789ABCDEF';
            let iterations = 0;
            const maxIterations = 6;
            
            function scramble() {
                let text = '';
                for (let i = 0; i < 6; i++) {
                    text += '[' + chars[Math.floor(Math.random() * chars.length)] + chars[Math.floor(Math.random() * chars.length)] + ']';
                }
                hex.textContent = text;
                
                iterations++;
                if (iterations < maxIterations) {
                    setTimeout(scramble, 40);
                }
            }
            
            scramble();
            copied.classList.add('show');
            
            setTimeout(() => {
                copied.classList.remove('show');
            }, 1500);
        }
    </script>
</body>
</html>
